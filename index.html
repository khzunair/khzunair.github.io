<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zunair Bin Zubair</title>
    <meta
      name="description"
      content="Product Engineer who builds platforms that scale. React Native, Next.js, Node.js. Built Tameer.ai from 0 to 1000+ users."
    />
    <meta name="author" content="Zunair Bin Zubair" />
    <meta
      name="keywords"
      content="Zunair Bin Zubair, Product Engineer, Full Stack Developer, React Native, Next.js, Node.js, Lahore, Pakistan"
    />
    <meta name="theme-color" content="#06060b" />
    <meta property="og:title" content="Zunair Bin Zubair — Product Engineer" />
    <meta
      property="og:description"
      content="I build products that scale. Currently scaling Tameer.ai to 1000+ users."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://khzunair.github.io" />
    <meta
      property="og:image"
      content="https://khzunair.github.io/assets/img/zunair-bin-zubair.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Tech logos for the skills marquee — loaded non-blocking so it never delays first paint -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Content is rendered from data.js by script.js — edit data.js to change anything. -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <nav class="nav" id="nav">
      <div class="nav-inner">
        <a href="#hero" class="nav-logo" id="navLogo"></a>
        <div class="nav-links" id="navLinks"></div>
        <button
          class="nav-toggle"
          id="navToggle"
          aria-label="Toggle menu"
          aria-expanded="false"
        >
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <main id="app"></main>

    <footer class="footer">
      <div class="container footer-inner" id="footer"></div>
    </footer>

    <!-- Video modal (iframe injected only on open — no autoplay players on load) -->
    <div class="modal" id="videoModal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-label="Project demo"
      >
        <button class="modal-close" data-close aria-label="Close demo">
          &times;
        </button>
        <div class="modal-video" id="modalVideo"></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
